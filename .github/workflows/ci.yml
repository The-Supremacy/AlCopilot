name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  openspec_design_gate:
    name: OpenSpec Design Gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate UI design-gate requirements in active OpenSpec changes
        run: scripts/ci/check-openspec-design-gate.sh

  server:
    name: Server (build + test)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore AlCopilot.slnx

      - name: Build
        run: dotnet build AlCopilot.slnx --no-restore -c Release

      - name: Test
        id: test
        run: |
          if find tests -name '*.csproj' 2>/dev/null | grep -q .; then
            dotnet test AlCopilot.slnx --no-build -c Release --logger trx --collect:"XPlat Code Coverage"
          else
            echo "No test projects found, skipping."
          fi

      - name: Upload test results
        if: always() && hashFiles('server/tests/**/TestResults/**/*.trx') != ''
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: server/tests/**/TestResults/

      - name: Coverage report
        if: github.event_name == 'pull_request' && hashFiles('server/tests/**/coverage.cobertura.xml') != ''
        uses: danielpalme/ReportGenerator-GitHub-Action@5
        with:
          reports: server/tests/**/coverage.cobertura.xml
          targetdir: coveragereport

      - name: Post coverage summary
        if: github.event_name == 'pull_request' && hashFiles('coveragereport/SummaryGithub.md') != ''
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          path: coveragereport/SummaryGithub.md

  web:
    name: Web (lint + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.node-version'
          cache: 'pnpm'

      - name: Detect web apps
        id: detect_web_apps
        run: |
          if find web/apps -mindepth 2 -maxdepth 2 -name package.json 2>/dev/null | grep -q .; then
            echo "has_web_apps=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_web_apps=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.detect_web_apps.outputs.has_web_apps == 'true'
        run: pnpm install --frozen-lockfile

      - name: Lint
        if: steps.detect_web_apps.outputs.has_web_apps == 'true'
        run: pnpm -r --filter "./web/apps/**" lint

      - name: Build
        if: steps.detect_web_apps.outputs.has_web_apps == 'true'
        run: pnpm -r --filter "./web/apps/**" build

      - name: Skip web checks when no web apps exist
        if: steps.detect_web_apps.outputs.has_web_apps != 'true'
        run: echo "No web app package.json files found under web/apps. Skipping web lint/build."
