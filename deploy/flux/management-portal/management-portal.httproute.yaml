apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: management-portal
  namespace: alcopilot
  labels:
    app.kubernetes.io/name: management-portal
spec:
  parentRefs:
    - name: alcopilot-gateway
      sectionName: management-http
  hostnames:
    - management.alcopilot.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: management-portal
          port: 80
