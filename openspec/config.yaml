schema: spec-driven

context: |
  ## Project: AlCopilot — AI-powered drinks suggestion platform

  See docs/constitution.md for project-wide governance, workflow rules, and
  artifact boundaries.
  See docs/architecture.md for full architecture, tech stack, module boundaries,
  and design decisions.
  See server/AGENTS.md for .NET conventions, DDD implementation details, and testing standards.
  See web/AGENTS.md for frontend conventions.

  OpenSpec-specific: This project uses the spec-driven schema. Changes should
  reference the constitution and architecture decisions by section, not duplicate them here.

rules:
  proposal:
    - Capture product intent explicitly: problem, desired outcome, and why this change matters now
    - Reference docs/constitution.md and docs/architecture.md for existing decisions instead of restating them
    - Identify which modules are affected
    - Note any new dependencies and verify they comply with project licensing and stack decisions
  specs:
    - Describe observable behavior and acceptance criteria, not broad narrative motivation
    - Prefer existing capability names when the change extends or reshapes an existing behavior area; create a new capability only when the behavior is genuinely distinct
    - Use Given/When/Then format for scenarios
    - Use RFC 2119 keywords (SHALL, MUST, SHOULD, MAY)
    - Respect existing module boundaries — do not cross them
    - Every scenario implies both a unit test (handler logic in isolation, NSubstitute for dependencies) and an integration test (end-to-end with real Postgres via TestContainers)
  design:
    - Start with the technical approach and intent needed to understand the implementation
    - Include rollback strategy for database migrations
    - Identify aggregate roots, value objects, and domain events for each affected module
    - Reference docs/constitution.md, docs/architecture.md, and server/AGENTS.md for module boundaries and DDD conventions — do not restate them
  tasks:
    - Group tasks by module/layer (backend, frontend, infrastructure)
    - Include architecture test updates for any new module boundaries
    - Include unit tests per handler (isolated logic, NSubstitute for dependencies, Shouldly assertions)
    - Include integration tests per feature (TestContainers Postgres, real database operations)
    - Target full test coverage — every spec scenario must map to at least one unit test and one integration test
    - Include tasks for DDD infrastructure (base types in Shared, repositories, value objects, domain events) when the module is the first to use them
